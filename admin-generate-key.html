<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin NotaKu - Generate License Key</title>
    <style>
        body {
            font-family: 'Lora', serif;
            background: #faf7f0;
            padding: 2rem;
            max-width: 600px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
        }
        input, select, button {
            width: 100%;
            padding: 0.75rem;
            margin: 0.5rem 0;
            border: 1px solid #ddd3bb;
            border-radius: 6px;
            font-size: 1rem;
        }
        button {
            background: #c9952a;
            color: #1a1208;
            font-weight: bold;
            cursor: pointer;
        }
        .generated-key {
            background: #f2ead8;
            padding: 1rem;
            border-radius: 6px;
            font-family: monospace;
            font-size: 1.2rem;
            text-align: center;
            margin: 1rem 0;
        }
        .bank-info {
            background: #e8f4e8;
            padding: 1rem;
            border-radius: 6px;
            margin-bottom: 1rem;
        }
        hr {
            border: none;
            border-top: 1px solid #ddd;
            margin: 1rem 0;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🔐 Admin NotaKu</h1>
        <p>Generate license key untuk user premium</p>
        
        <div class="bank-info">
            <strong>🏦 REKENING ANDA:</strong><br>
            Bank BRI<br>
            No. Rekening: 3593 0100 9186 508<br>
            A.n. [Ardian Nurraihan]
        </div>
        
        <hr>
        
        <h3>Generate License Key Baru</h3>
        <label>Nama Pembeli:</label>
        <input type="text" id="buyerName" placeholder="Contoh: Warung Makmur">
        
        <label>Durasi Premium:</label>
        <select id="duration">
            <option value="30">1 Bulan (Rp 49.000)</option>
            <option value="365">1 Tahun (Rp 499.000) - Hemat 15%</option>
        </select>
        
        <button onclick="generateLicenseKey()">Generate License Key</button>
        
        <div id="result" style="display:none;">
            <h3>✅ License Key:</h3>
            <div class="generated-key" id="licenseKey"></div>
            <p style="font-size:0.8rem; color:#666;">Kirim kode ini ke pembeli melalui WhatsApp/Email</p>
        </div>
        
        <hr>
        
        <h3>📋 Semua License Key Aktif</h3>
        <div id="keyList"></div>
    </div>

    <script>
        // Load existing keys dari localStorage
        let allKeys = JSON.parse(localStorage.getItem('notaku_all_license_keys') || '[]');
        
        function saveKeys() {
            localStorage.setItem('notaku_all_license_keys', JSON.stringify(allKeys));
        }
        
        function generateLicenseKey() {
            const buyerName = document.getElementById('buyerName').value.trim();
            const duration = parseInt(document.getElementById('duration').value);
            
            if (!buyerName) {
                alert('Masukkan nama pembeli!');
                return;
            }
            
            // Generate random key format: NOTAKU-XXXX-XXXX-XXXX
            const randomPart = () => Math.random().toString(36).substring(2, 6).toUpperCase();
            const key = `NOTAKU-${randomPart()}-${randomPart()}-${randomPart()}`;
            
            const expiresAt = new Date();
            expiresAt.setDate(expiresAt.getDate() + duration);
            
            const newKey = {
                key: key,
                buyerName: buyerName,
                createdAt: new Date().toISOString(),
                expiresAt: expiresAt.toISOString(),
                duration: duration,
                isActive: true
            };
            
            allKeys.push(newKey);
            saveKeys();
            updatePremiumJS();
            
            // Tampilkan hasil
            document.getElementById('result').style.display = 'block';
            document.getElementById('licenseKey').innerHTML = key;
            
            // Reset form sedikit
            document.getElementById('buyerName').value = '';
            
            // Refresh daftar
            displayAllKeys();
            
            // Copy ke clipboard otomatis
            navigator.clipboard.writeText(key);
            alert('✅ Key berhasil dibuat dan sudah di-copy!');
        }
        
        function displayAllKeys() {
            const container = document.getElementById('keyList');
            const activeKeys = allKeys.filter(k => new Date(k.expiresAt) > new Date());
            
            if (activeKeys.length === 0) {
                container.innerHTML = '<p style="color:#666;">Belum ada license key aktif</p>';
                return;
            }
            
            container.innerHTML = activeKeys.map(k => `
                <div style="border-bottom:1px solid #ddd; padding:0.5rem 0;">
                    <strong>${k.key}</strong><br>
                    Pembeli: ${k.buyerName}<br>
                    Expired: ${new Date(k.expiresAt).toLocaleDateString('id-ID')}
                    <button onclick="deleteKey('${k.key}')" style="background:#c0431a; padding:0.2rem 0.5rem; width:auto; margin-top:0.3rem;">Hapus</button>
                </div>
            `).join('');
        }
        
        function deleteKey(key) {
            if (confirm(`Hapus key ${key}?`)) {
                allKeys = allKeys.filter(k => k.key !== key);
                saveKeys();
                updatePremiumJS();
                displayAllKeys();
            }
        }
        
        function updatePremiumJS() {
            // Update file premium.js dengan keys terbaru
            const activeKeys = allKeys.filter(k => new Date(k.expiresAt) > new Date());
            const validKeysArray = activeKeys.map(k => k.key);
            
            const premiumJSCode = `// premium.js - Sistem License Key (Auto-generated by admin)
const PREMIUM_CONFIG = {
  validKeys: ${JSON.stringify(validKeysArray)},
  
  isPremium: function() {
    const saved = localStorage.getItem('notaku_premium_key');
    return saved && this.validKeys.includes(saved);
  },
  
  activate: function(key) {
    if (this.validKeys.includes(key)) {
      localStorage.setItem('notaku_premium_key', key);
      // Cari expired date dari key yang diaktivasi
      const keyData = ${JSON.stringify(activeKeys)}.find(k => k.key === key);
      if (keyData) {
        localStorage.setItem('notaku_premium_until', keyData.expiresAt);
      } else {
        localStorage.setItem('notaku_premium_until', new Date(Date.now() + 30*24*60*60*1000).toISOString());
      }
      return true;
    }
    return false;
  },
  
  isExpired: function() {
    const until = localStorage.getItem('notaku_premium_until');
    if (!until) return true;
    return new Date(until) < new Date();
  }
};

window.PremiumAPI = PREMIUM_CONFIG;`;
            
            // Tampilkan instruksi update
            console.log('Premium keys updated. Copy kode di bawah ke premium.js');
            document.getElementById('keyList').innerHTML += `
                <div style="background:#ffffcc; padding:1rem; margin-top:1rem;">
                    ⚠️ <strong>PENTING:</strong> Copy kode di bawah dan <strong>ganti isi file premium.js</strong> di GitHub:<br>
                    <textarea id="premiumCode" style="width:100%; height:200px; font-size:10px;">${premiumJSCode}</textarea>
                    <button onclick="copyPremiumCode()" style="margin-top:0.5rem;">Copy Kode</button>
                </div>
            `;
        }
        
        function copyPremiumCode() {
            const code = document.getElementById('premiumCode');
            code.select();
            document.execCommand('copy');
            alert('Kode premium.js sudah di-copy! Sekarang paste di GitHub');
        }
        
        // Tampilkan semua key saat load
        displayAllKeys();
    </script>
</body>
</html>
